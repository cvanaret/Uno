site_name: Uno
theme:
  name: material
  features:
    - navigation.footer
    - navigation.top
nav:
  - Introduction: 'index.md'
  - Installation: 'installation.md'
  - 'Getting started': 'getting_started.md'
  - 'The Uno solver':
    - 'Architecture': 'architecture.md'
    - 'Options': 'options.md'
  - 'Unification theory':
    - 'Unification framework': 'unification_framework.md'
    - 'Combining the ingredients': 'combining_ingredients.md'
  - 'CUTE benchmark': 'cute_benchmark.md'
  - 'Interfaces':
    - 'Python': 'interfaces/python.md'
    - 'Julia': 'interfaces/julia.md'
    - 'C': 'interfaces/c.md'
    - 'AMPL': 'interfaces/ampl.md'
    - 'Fortran': 'interfaces/fortran.md'
  - 'Issue tracker': 'https://github.com/cvanaret/Uno/issues'
  - 'Checklists for developers': 'developers/checklists.md'
  - 'Citing Uno': 'citing_uno.md'
  - Acknowledgments: 'acknowledgments.md'

repo_url: https://github.com/cvanaret/Uno

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - admonition

extra_javascript:
  - javascript/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
