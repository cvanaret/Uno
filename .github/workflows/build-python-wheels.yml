name: Build Python wheels
# https://github.com/pypa/cibuildwheel/blob/main/examples/github-minimal.yml

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'
      - '*.yml'
      - '*.yaml'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'
      - '*.yml'
      - '*.yaml'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CIBW_TEST_COMMAND: >
    python {project}/interfaces/Python/tests/run_wheel_tests.py
  CIBW_TEST_REQUIRES: numpy

jobs:
  build_wheels:
    name: Build wheels on (${{ matrix.sys.os }}, ${{ matrix.sys.build }})
    runs-on: ${{ matrix.sys.os }}
    strategy:
      fail-fast: false
      matrix:
        sys:
          - { os: ubuntu-latest, shell: bash, build: "*manylinux*" }
          - { os: ubuntu-22.04-arm, shell: bash, build: "*manylinux*" }
          - { os: macos-15, shell: bash, build: "*" }
          - { os: macos-15-intel, shell: bash, build: "*" }
          - { os: windows-latest, shell: 'msys2 {0}', build: "*" }
    defaults:
      run:
        shell: ${{ matrix.sys.shell }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install unzip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: C:/msys64/usr/bin/bash -lc "pacman -Sy --noconfirm --needed unzip"

      - run: pip install cibuildwheel
        if: runner.os != 'Windows'

      - run: pip install cibuildwheel
        if: runner.os == 'Windows'
        shell: pwsh

      - name: Install delvewheel (Windows)
        if: runner.os == 'Windows'
        run: pip install delvewheel
        shell: pwsh

      - name: Install libomp (macOS)
        if: startsWith(matrix.sys.os, 'macos')
        run: |
          brew install libomp
          LIBGFORTRAN_FOLDER=$(dirname "$(gfortran-15 -print-file-name=libgfortran.dylib)")
          echo "LIBGFORTRAN_FOLDER=$LIBGFORTRAN_FOLDER" >> $GITHUB_ENV
          echo "OPENMP_LIB=$(brew --prefix libomp)/lib/libomp.dylib" >> $GITHUB_ENV

      - name: Install matching MinGW (GCC 14.2.0 posix-seh-msvcrt)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://github.com/niXman/mingw-builds-binaries/releases/download/14.2.0-rt_v12-rev0/x86_64-14.2.0-release-posix-seh-msvcrt-rt_v12-rev0.7z"
          Invoke-WebRequest $url -OutFile mingw.7z
          7z x mingw.7z -oC:\mingw1420 -y          # clean dir, NOT C:\mingw64
          # the archive contains a top-level mingw64\ folder, so the compiler ends up at:
          C:\mingw1420\mingw64\bin\gcc --version
          C:\mingw1420\mingw64\bin\g++ --version

      - name: Put 14.2 toolchain first on PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "C:\mingw1420\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build wheels (Linux)
        if: runner.os == 'Linux'
        run: cibuildwheel --output-dir ${{github.workspace}}/wheelhouse
        env:
          CIBW_BUILD: ${{ matrix.sys.build }}
          CIBW_SKIP: cp38-* *_i686 *-win32
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_34
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_34
          CIBW_ENVIRONMENT_LINUX: >
            CMAKE_GENERATOR=Ninja
            CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)
            LD_LIBRARY_PATH=/project/dependencies/lib:/project/dependencies/lib/julia
            AUDITWHEEL_PLAT=manylinux_2_35_$(uname -m)
          # Linux wheels need glibc 2.35; test them in a separate job
          CIBW_TEST_SKIP: "*-manylinux_*"
          CIBW_BEFORE_ALL_LINUX:
            bash dependencies/scripts/download_dependencies.sh
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel repair --exclude libkrylov.so --exclude 'libjulia*.so*' --exclude 'libopenlibm*.so*' -w {dest_dir} {wheel}

      - name: Build wheels (macOS)
        if: startsWith(matrix.sys.os, 'macos')
        run: cibuildwheel --output-dir ${{github.workspace}}/wheelhouse
        env:
          # Override what setup-fortran set at the step level
          CC: clang
          CXX: clang++
          MACOSX_DEPLOYMENT_TARGET: 15.0
          CIBW_SKIP: cp*-*_i686 *-win32
          CIBW_BEFORE_ALL_MACOS: |
            cat > /tmp/clang_toolchain.cmake << 'EOF'
            set(CMAKE_C_COMPILER clang)
            set(CMAKE_CXX_COMPILER clang++)
            set(CMAKE_Fortran_COMPILER gfortran-15)
            set(OpenMP_C_FLAGS "-Xpreprocessor -fopenmp")
            set(OpenMP_CXX_FLAGS "-Xpreprocessor -fopenmp")
            set(OpenMP_C_LIB_NAMES omp)
            set(OpenMP_CXX_LIB_NAMES omp)
            set(OpenMP_omp_LIBRARY $OPENMP_LIB)
            set(CMAKE_EXE_LINKER_FLAGS "-L$LIBGFORTRAN_FOLDER -lgfortran -Wl,-rpath,$LIBGFORTRAN_FOLDER")
            set(CMAKE_SHARED_LINKER_FLAGS "-L$LIBGFORTRAN_FOLDER -lgfortran -Wl,-rpath,$LIBGFORTRAN_FOLDER")
            EOF
            bash dependencies/scripts/download_dependencies.sh
          CIBW_ENVIRONMENT_MACOS: >
            CC=clang
            CXX=clang++
            FC=gfortran-15
            CMAKE_TOOLCHAIN_FILE=/tmp/clang_toolchain.cmake
            CMAKE_GENERATOR=Ninja
            CMAKE_BUILD_PARALLEL_LEVEL=$(sysctl -n hw.logicalcpu)
          CIBW_CONFIG_SETTINGS_MACOS: >
            cmake.define.KRYLOV=dependencies/lib/libkrylov.dylib
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            delocate-wheel --require-archs {delocate_archs} --ignore-missing-dependencies -w {dest_dir} -v {wheel}

      - name: Build wheels (Windows)
        if: runner.os == 'Windows'
        run: cibuildwheel --output-dir ${{github.workspace}}/wheelhouse
        shell: pwsh
        env:
          UNO_TOOLCHAIN: mingw
          CC: C:/mingw64/bin/gcc.exe
          CXX: C:/mingw64/bin/g++.exe
          CMAKE_C_COMPILER: C:/mingw64/bin/gcc.exe
          CMAKE_CXX_COMPILER: C:/mingw64/bin/g++.exe
          CIBW_SKIP: cp314t-* cp*-*_i686 *-win32
          CIBW_BEFORE_ALL_WINDOWS: >
            C:/msys64/usr/bin/bash -lc "cd \"$(cygpath -u '{package}')\" && ./dependencies/scripts/download_dependencies.sh" &&
            pwsh -Command "Get-ChildItem -Path '{package}/dependencies' -Recurse |
            ForEach-Object { $_.LastWriteTime = Get-Date }"
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            pwsh -Command "$env:SOURCE_DATE_EPOCH='315532800';
            delvewheel repair --no-mangle-all --add-path 'C:/mingw64/bin;dependencies/bin' -w {dest_dir} {wheel}"
          CIBW_ENVIRONMENT_WINDOWS: >
            CMAKE_BUILD_PARALLEL_LEVEL=$NUMBER_OF_PROCESSORS
            CMAKE_GENERATOR="MinGW Makefiles"
            CMAKE_MAKE_PROGRAM=C:/mingw1420/mingw64/bin/mingw32-make.exe
            CMAKE_C_COMPILER=C:/mingw1420/mingw64/bin/gcc.exe
            CMAKE_CXX_COMPILER=C:/mingw1420/mingw64/bin/g++.exe
            CMAKE_Fortran_COMPILER=C:/mingw1420/mingw64/bin/gfortran.exe
          CIBW_CONFIG_SETTINGS_WINDOWS: >
            cmake.define.METIS_LIBRARY=dependencies/bin/libmetis.dll
            cmake.define.KRYLOV=dependencies/bin/libkrylov.dll

      - name: Store artifacts
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: cibw-wheels-${{ matrix.sys.os }}-${{ strategy.job-index }}
          path: ${{ github.workspace }}/wheelhouse/*.whl
          if-no-files-found: warn

  # test the Linux wheels with glibc ≥ 2.35
  test-linux-wheels:
    needs: build_wheels
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-linux-*
          path: wheelhouse
          merge-multiple: true
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - shell: bash
        run: |
          python -m pip install --find-links wheelhouse --only-binary=:all: unopy
          cd "$RUNNER_TEMP"   # run from outside the repo so 'import unopy' hits the wheel, not the source
          python "$GITHUB_WORKSPACE/interfaces/Python/tests/run_wheel_tests.py"

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  check-release:
    name: Check latest commit message
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      test_release_commit: ${{ steps.check.outputs.test_release_commit }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # check if the latest PR commit message contains '[unopy] Test release'
      - name: Check latest commit message
        id: check
        run: |
          commit_message="$(git log -1 --pretty=%B)"
          echo "Latest commit message: $commit_message"
          if echo "$commit_message" | grep -q '\[unopy\] Test release'; then
            echo "test_release_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "test_release_commit=false" >> "$GITHUB_OUTPUT"
          fi

  upload_testpypi:
    needs: [build_wheels, build_sdist, check-release]
    # if the latest PR commit message contains '[unopy] Test release', trigger the upload to TestPyPi
    name: Upload release to TestPyPI
    if: needs.check-release.outputs.test_release_commit == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

  upload_pypi:
    needs: [build_wheels, build_sdist]
    # if the merge commit message contains '[unopy] Release' or '[Release]', trigger the upload to PyPi
    name: Upload release to PyPI
    if: >-
      (github.event_name == 'push' && (contains(github.event.head_commit.message, '[unopy] Release') ||
                                       contains(github.event.head_commit.message, '[Release]')))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  # test TestPyPI's unopy artifacts after upload to PyPI
  test_testpypi:
    needs: upload_testpypi
    name: Test TestPyPI artifacts
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-15, macos-15-intel, windows-latest]
        python-version: [ "3.12" ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install unopy from TestPyPI
        run: pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ unopy

      - name: Run example
        working-directory: ${{github.workspace}}/interfaces/Python/example
        run: python example_hs015.py

  # test PyPI's unopy artifacts after upload to PyPI
  test_pypi:
    needs: upload_pypi
    name: Test PyPI artifacts
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-15, macos-15-intel, windows-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install unopy from PyPI
        run: pip install unopy

      - name: Run example
        working-directory: ${{github.workspace}}/interfaces/Python/example
        run: python example_hs015.py
