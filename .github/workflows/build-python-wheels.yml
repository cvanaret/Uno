name: Build Python wheels
# https://github.com/pypa/cibuildwheel/blob/main/examples/github-minimal.yml

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'
      - '*.yml'
      - '*.yaml'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'
      - '*.yml'
      - '*.yaml'
      - 'docs/**'

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.sys.os }}
    runs-on: ${{ matrix.sys.os }}
    strategy:
      fail-fast: false
      matrix:
        sys:
          - { os: ubuntu-latest, shell: bash }
          - { os: ubuntu-22.04-arm, shell: bash }
          - { os: macos-latest, shell: bash }
          - { os: macos-15-intel, shell: bash }
          - { os: windows-latest, shell: 'msys2 {0}' }
    defaults:
      run:
        shell: ${{ matrix.sys.shell }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install cibuildwheel

      - name: Install Fortran compiler (macOS)
        if: startsWith(matrix.sys.os, 'macos')
        uses: fortran-lang/setup-fortran@main
        with:
          compiler: 'gcc'
          version: '13'
          
      - name: Install libomp (macOS)
        if: startsWith(matrix.sys.os, 'macos')
        run: |
          brew install libomp
          if [[ $(uname -m) == 'arm64' ]]; then
            echo "OPENMP_LIB=/opt/homebrew/opt/libomp/lib/libomp.dylib" >> $GITHUB_ENV
            echo "LIBGFORTRAN_FOLDER=/opt/homebrew/opt/gcc/lib/gcc/15" >> $GITHUB_ENV
          else
            echo "OPENMP_LIB=/usr/local/opt/libomp/lib/libomp.dylib" >> $GITHUB_ENV
            echo "LIBGFORTRAN_FOLDER=/usr/local/opt/gcc/lib/gcc/15" >> $GITHUB_ENV
          fi

      - name: Build wheels (Linux)
        if: runner.os == 'Linux'
        run: cibuildwheel --output-dir ${{github.workspace}}/wheelhouse
        env:
          CIBW_BEFORE_BUILD: bash dependencies/scripts/download_dependencies.sh
          # Skip some builds
          CIBW_SKIP: cp36-* cp37-* cp*-*_i686 pp* *-win32

      - name: Build wheels (macOS)
        if: startsWith(matrix.sys.os, 'macos')
        run: cibuildwheel --output-dir ${{github.workspace}}/wheelhouse
        env:
          # Override what setup-fortran set at the step level
          CC: clang
          CXX: clang++
          MACOSX_DEPLOYMENT_TARGET: 15.0
          CIBW_BEFORE_ALL_MACOS: |
            cat > /tmp/clang_toolchain.cmake << 'EOF'
            set(CMAKE_C_COMPILER clang)
            set(CMAKE_CXX_COMPILER clang++)
            set(CMAKE_Fortran_COMPILER gfortran-15)
            set(OpenMP_C_FLAGS "-Xpreprocessor -fopenmp")
            set(OpenMP_CXX_FLAGS "-Xpreprocessor -fopenmp")
            set(OpenMP_C_LIB_NAMES omp)
            set(OpenMP_CXX_LIB_NAMES omp)
            set(OpenMP_omp_LIBRARY $OPENMP_LIB)
            set(CMAKE_EXE_LINKER_FLAGS "-L$LIBGFORTRAN_FOLDER -lgfortran -Wl,-rpath,$LIBGFORTRAN_FOLDER")
            set(CMAKE_SHARED_LINKER_FLAGS "-L$LIBGFORTRAN_FOLDER -lgfortran -Wl,-rpath,$LIBGFORTRAN_FOLDER")
            EOF
          CIBW_ENVIRONMENT_MACOS: >
            CC=clang
            CXX=clang++
            FC=gfortran-15
            CMAKE_TOOLCHAIN_FILE=/tmp/clang_toolchain.cmake
          CIBW_BEFORE_BUILD: bash dependencies/scripts/download_dependencies.sh
          # Skip some builds
          CIBW_SKIP: cp36-* cp37-* cp*-*_i686 pp* *-win32
      
      - name: Build wheels (Windows)
        if: runner.os == 'Windows'
        run: cibuildwheel --output-dir ${{github.workspace}}/wheelhouse
        env:
          CIBW_BEFORE_BUILD: bash {package}/dependencies/scripts/download_dependencies.sh
          CIBW_BEFORE_BUILD_WINDOWS: >
            C:/msys64/usr/bin/bash -lc "cd \"$(cygpath -u '{package}')\" && ./dependencies/scripts/download_dependencies.sh"
          CIBW_ENVIRONMENT_WINDOWS: >
            CMAKE_GENERATOR="MinGW Makefiles"
            CMAKE_MAKE_PROGRAM=C:/mingw64/bin/mingw32-make.exe
            CMAKE_C_COMPILER=C:/mingw64/bin/gcc.exe
            CMAKE_CXX_COMPILER=C:/mingw64/bin/g++.exe
            CMAKE_Fortran_COMPILER=C:/mingw64/bin/gfortran.exe
          CIBW_CONFIG_SETTINGS_WINDOWS: >
            cmake.define.METIS_LIBRARY=dependencies/bin/libmetis.dll
            cmake.define.HIGHS=dependencies/bin/libhighs.dll
          # Skip some builds
          CIBW_SKIP: cp36-* cp37-* cp*-*_i686 pp* *-win32

      - name: Store artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.sys.os }}-${{ strategy.job-index }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download dependencies
        run: bash dependencies/scripts/download_dependencies.sh

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  check-release:
    name: Check latest commit message
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      test_release_commit: ${{ steps.check.outputs.test_release_commit }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # check if the latest PR commit message contains '[unopy] Test release'
      - name: Check latest commit message
        id: check
        run: |
          commit_message="$(git log -1 --pretty=%B)"
          echo "Latest commit message: $commit_message"
          if echo "$commit_message" | grep -q '\[unopy\] Test release'; then
            echo "test_release_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "test_release_commit=false" >> "$GITHUB_OUTPUT"
          fi

  upload_testpypi:
    needs: [build_wheels, build_sdist, check-release]
    # if the latest PR commit message contains '[unopy] Test release', trigger the upload to TestPyPi
    name: Upload release to TestPyPI
    if: needs.check-release.outputs.test_release_commit == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

  upload_pypi:
    needs: [build_wheels, build_sdist]
    # if the merge commit message contains '[unopy] Release', trigger the upload to PyPi
    name: Upload release to PyPI
    if: >-
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[unopy] Release'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  # test TestPyPI's unopy artifacts after upload to PyPI
  test_testpypi:
    needs: upload_testpypi
    name: Test TestPyPI artifacts
    runs-on: ${{ matrix.sys.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: [ "3.12" ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install unopy from TestPyPI
        run: pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ unopy

      - name: Run example
        working-directory: ${{github.workspace}}/interfaces/Python/example
        run: python example_hs015.py

  # test PyPI's unopy artifacts after upload to PyPI
  test_pypi:
    needs: upload_pypi
    name: Test PyPI artifacts
    runs-on: ${{ matrix.sys.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4
    
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.architecture }}

      - name: Install unopy from PyPI
        run: pip install unopy

      - name: Run example
        working-directory: ${{github.workspace}}/interfaces/Python/example
        run: python example_hs015.py
