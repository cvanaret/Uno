name: Build Python wheels
# https://github.com/pypa/cibuildwheel/blob/main/examples/github-minimal.yml

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.sys.os }}
    runs-on: ${{ matrix.sys.os }}
    strategy:
      fail-fast: false
      matrix:
        sys:
          - { os: ubuntu-latest, shell: bash }
          - { os: ubuntu-22.04-arm, shell: bash }
          - { os: macos-latest, shell: bash }
          - { os: macos-15-intel, shell: bash }
          - { os: windows-2022, shell: 'msys2 {0}' }
    defaults:
      run:
        shell: ${{ matrix.sys.shell }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Fortran compiler (macOS)
        uses: fortran-lang/setup-fortran@main
        with:
          compiler: 'gcc'
          version: '13'
        if: startsWith(matrix.sys.os, 'macos')

      - name: Install MinGW (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: |
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make

      - name: Prepend MSYS2 to PATH (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "PATH=C:/msys64/mingw64/bin;C:/Windows/System32;C:/Windows;C:/Windows/System32/WindowsPowerShell/v1.0;${PATH}" >> $GITHUB_ENV
      
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          MACOSX_DEPLOYMENT_TARGET: 15.0
          CIBW_BEFORE_BUILD: bash {project}/dependencies/scripts/download_dependencies.sh
          CIBW_BEFORE_BUILD_WINDOWS: >
            C:/msys64/usr/bin/bash -lc "$(cygpath -u '{project}')/dependencies/scripts/download_dependencies.sh"
          CIBW_ENVIRONMENT_WINDOWS: >
            CMAKE_GENERATOR="MinGW Makefiles"
            CMAKE_C_COMPILER=x86_64-w64-mingw32-gcc
            CMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++
            CMAKE_Fortran_COMPILER=x86_64-w64-mingw32-gfortran
          # Skip some builds
          CIBW_SKIP: cp36-* cp37-* cp*-*_i686 pp* *-win32

      - name: Store artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.sys.os }}-${{ strategy.job-index }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download dependencies
        run: bash dependencies/scripts/download_dependencies.sh

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  check-release:
    name: Check latest commit message
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      test_release_commit: ${{ steps.check.outputs.test_release_commit }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # check if the latest PR commit message contains '[unopy] Test release'
      - name: Check latest commit message
        id: check
        run: |
          commit_message="$(git log -1 --pretty=%B)"
          echo "Latest commit message: $commit_message"
          if echo "$commit_message" | grep -q '\[unopy\] Test release'; then
            echo "test_release_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "test_release_commit=false" >> "$GITHUB_OUTPUT"
          fi

  upload_testpypi:
    needs: [build_wheels, build_sdist, check-release]
    # if the latest PR commit message contains '[unopy] Test release', trigger the upload to TestPyPi
    name: Upload release to TestPyPI
    if: needs.check-release.outputs.test_release_commit == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

  upload_pypi:
    needs: [build_wheels, build_sdist]
    # if the merge commit message contains '[unopy] Release', trigger the upload to PyPi
    name: Upload release to PyPI
    if: >-
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[unopy] Release'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
