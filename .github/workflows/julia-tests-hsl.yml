name: Julia tests for HSL linear solvers

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'
      - '*.yml'
      - '*.yaml'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'
      - '*.yml'
      - '*.yaml'
      - 'docs/**'

env:
  BUILD_TYPE: Debug
  VENV: /home/optimi/cvanaret/myenv
  RUNNER_PATH: /home/optimi/cvanaret/actions-runner

jobs:
  compilation-uno-hsl:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v4

    - name: Install Meson and Ninja
      run: |
        ${{env.VENV}}/bin/pip install meson==1.7.1
        ${{env.VENV}}/bin/pip install ninja
        echo "$HOME/.local/bin" >> $GITHUB_PATH

#    - name: Compile BLAS and LAPACK
#      run: |
#        cd $RUNNER_PATH/lapack
#        rm -rf builddir
#        mkdir builddir && cd builddir
#        cmake .. \
#          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
#          -DBUILD_SHARED_LIBS=OFF \
#          -DBUILD_INDEX64_EXT_API=OFF \
#          -DTEST_FORTRAN_COMPILER=OFF
#        make -j4

    - name: Compile libHSL
      run: |
        BLAS_PATH="/usr/lib/x86_64-linux-gnu"
        LAPACK_PATH="/usr/lib/x86_64-linux-gnu"
        cd $RUNNER_PATH/libhsl
        rm -rf builddir
        meson setup builddir --buildtype=debug \
                             -Dlibblas=blas \
                             -Dliblapack=lapack \
                             -Dlibblas_path=${BLAS_PATH} \
                             -Dliblapack_path=${LAPACK_PATH} \
                             -Ddefault_library=shared
        meson compile -C builddir

    - name: Compile AMPL
      run: |
        cd $RUNNER_PATH/ampl
        make -f makefile.u clean
        make -f makefile.u CC=gcc CFLAGS="-O2 -fPIC"

    - name: Configure CMake -- Uno
      run: |
        LIBBLAS_PATH="/usr/lib/x86_64-linux-gnu/libblas.a"
        LIBLAPACK_PATH="/usr/lib/x86_64-linux-gnu/liblapack.a"
        LIBHSL_PATH="$RUNNER_PATH/libhsl/builddir/libhsl.so"
        LIBAMPL_PATH="$RUNNER_PATH/ampl/amplsolver.a"
        cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
                                             -DBLAS_LIBRARIES=${LIBBLAS_PATH} \
                                             -DLAPACK_LIBRARIES=${LIBLAPACK_PATH} \
                                             -DHSL=${LIBHSL_PATH} \
                                             -DAMPLSOLVER=${LIBAMPL_PATH}

    - name: Build -- Uno
      run: cmake --build ${{github.workspace}}/build --target uno_ampl --config ${{env.BUILD_TYPE}}

    - name: Install -- Uno
      run: |
        rm -rf $RUNNER_PATH/Uno_jll.jl/override/bin/uno_ampl
        cp ${{github.workspace}}/build/uno_ampl ~/.julia/dev/Uno_jll/override/bin

  preset-ipopt:
    needs: compilation-uno-hsl
    runs-on: self-hosted
    strategy:
      matrix:
        HSL_SOLVER: [ma27, ma57, ma86]
    name: Run Julia tests for the ipopt preset with ${{matrix.HSL_SOLVER}}
    steps:
    - uses: actions/checkout@v4

    - name: Install Julia
      uses: julia-actions/setup-julia@v2

    - name: Run runtests_uno_ipopt_${{matrix.HSL_SOLVER}}.jl
      shell: julia --color=yes --project=.github/julia {0}
      run: |
        using Pkg
        Pkg.instantiate()
        Pkg.develop("Uno_jll")
        include("$RUNNER_PATH/_work/Uno/Uno/.github/julia/runtests_uno_ipopt_${{matrix.HSL_SOLVER}}.jl")
