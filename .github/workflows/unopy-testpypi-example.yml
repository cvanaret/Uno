name: TestPyPI's unopy on Python example

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'
      - '*.yml'
      - '*.yaml'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'
      - '*.yml'
      - '*.yaml'
      - 'docs/**'

env:
  BUILD_TYPE: Debug

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Add MSBuild/MSVC to PATH (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Upgrade pip, setuptools, wheel
        run: python -m pip install --upgrade pip setuptools wheel
      
      - name: Install unopy from TestPyPI
        run: python -m pip install -v --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ unopy

      - name: Diagnose DLL issue (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # 1. What got bundled into the wheel?
          Get-ChildItem "C:\hostedtoolcache\windows\Python\3.12.10\x64\Lib\site-packages\unopy" -Recurse
          Get-ChildItem "C:\hostedtoolcache\windows\Python\3.12.10\x64\Lib\site-packages\unopy.libs" -Recurse

          # 2. What does delvewheel think is still missing?
          pip install delvewheel
          delvewheel show "C:\hostedtoolcache\windows\Python\3.12.10\x64\Lib\site-packages\unopy\unopy.cp312-win_amd64.pyd"

          # 3. Full traceback of the import error
          python -c "
          import traceback
          try:
              import unopy
          except Exception:
              traceback.print_exc()
          "

      - name: Find missing symbol (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        continue-on-error: true
        run: |
          $script = @'
          import pefile, os, sys
    
          libs_dir = 'C:/hostedtoolcache/windows/Python/3.12.10/x64/Lib/site-packages/unopy.libs'
          pyd = 'C:/hostedtoolcache/windows/Python/3.12.10/x64/Lib/site-packages/unopy/unopy.cp312-win_amd64.pyd'
    
          # Verify libs_dir exists and is being added
          print('libs_dir exists:', os.path.isdir(libs_dir))
          print('libs_dir abspath:', os.path.abspath(libs_dir))
          os.add_dll_directory(os.path.abspath(libs_dir))
    
          # Try loading with ctypes for a more specific error
          import ctypes
          try:
            ctypes.CDLL(pyd)
            print('ctypes load succeeded')
          except OSError as e:
            print('ctypes error:', e)
    
          # What does the .pyd import?
          pe = pefile.PE(pyd)
          for entry in pe.DIRECTORY_ENTRY_IMPORT:
            dll_name = entry.dll.decode()
            print('DLL: ' + dll_name)
            for imp in entry.imports:
              name = imp.name.decode() if imp.name else 'ordinal:' + str(imp.ordinal)
              print('  ' + name)
          '@
          $script | Out-File -FilePath diagnose.py -Encoding utf8
          python diagnose.py

      - name: Check system DLL imports (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        continue-on-error: true
        run: |
          $script = @'
          import pefile, os, glob
    
          pyd = 'C:/hostedtoolcache/windows/Python/3.12.10/x64/Lib/site-packages/unopy/unopy.cp312-win_amd64.pyd'
          libs_dir = 'C:/hostedtoolcache/windows/Python/3.12.10/x64/Lib/site-packages/unopy.libs'
          bundled = [d.lower() for d in os.listdir(libs_dir)]
    
          # System DLL search paths
          system_dirs = [
          'C:/Windows/System32',
          'C:/Windows/SysWOW64',
          'C:/Windows',
          'C:/Windows/System32/downlevel',   # <-- UCRT forwarder DLLs live here
          'C:/hostedtoolcache/windows/Python/3.12.10/x64',
          ]

          # Build export table from system DLLs that the .pyd imports
          pe = pefile.PE(pyd)
          for entry in pe.DIRECTORY_ENTRY_IMPORT:
            dll_name = entry.dll.decode()
            if dll_name.lower() in bundled:
              continue
            # Find the DLL on disk
            dll_path = None
            for d in system_dirs:
              candidate = os.path.join(d, dll_name)
              if os.path.exists(candidate):
                dll_path = candidate
                break
            if not dll_path:
              print('DLL NOT FOUND ON SYSTEM: ' + dll_name)
              continue
            # Get its exports
            try:
              sys_pe = pefile.PE(dll_path)
              sys_exports = {}
              if hasattr(sys_pe, 'DIRECTORY_ENTRY_EXPORT'):
                for sym in sys_pe.DIRECTORY_ENTRY_EXPORT.symbols:
                  if sym.name:
                    sys_exports[sym.name.decode()] = sym.ordinal
              # Check each import
              for imp in entry.imports:
                if imp.name:
                  sym = imp.name.decode()
                  if sym not in sys_exports:
                    print('MISSING from ' + dll_name + ': ' + sym)
                else:
                  if imp.ordinal not in sys_exports.values():
                    print('MISSING ordinal ' + str(imp.ordinal) + ' from ' + dll_name)
            except Exception as e:
              print('Error reading ' + dll_name + ': ' + str(e))
          '@
          $script | Out-File -FilePath diagnose6.py -Encoding utf8
          python diagnose6.py

      - name: Check libgcc_s_seh exports (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        continue-on-error: true
        run: |
          $script = @'
          import pefile, os
          
          libs_dir = 'C:/hostedtoolcache/windows/Python/3.12.10/x64/Lib/site-packages/unopy.libs'
          dll_path = os.path.join(libs_dir, 'libgcc_s_seh-1.dll')
          
          pe = pefile.PE(dll_path)
          print('Exports from libgcc_s_seh-1.dll:')
          if hasattr(pe, 'DIRECTORY_ENTRY_EXPORT'):
            for sym in pe.DIRECTORY_ENTRY_EXPORT.symbols:
              name = sym.name.decode() if sym.name else 'ordinal:' + str(sym.ordinal)
              print('  ' + name)
          else:
            print('  NO EXPORTS FOUND')
          '@
          $script | Out-File -FilePath diagnose8.py -Encoding utf8
          python diagnose8.py

      - name: Run example
        working-directory: ${{github.workspace}}/interfaces/Python/example
        run: python example_hs015.py
