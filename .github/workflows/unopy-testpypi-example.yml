name: TestPyPI's unopy on Python example

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'
      - '*.yml'
      - '*.yaml'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'
      - '*.yml'
      - '*.yaml'
      - 'docs/**'

env:
  BUILD_TYPE: Debug

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Add MSBuild/MSVC to PATH (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Upgrade pip, setuptools, wheel
        run: python -m pip install --upgrade pip setuptools wheel
      
      - name: Install unopy from TestPyPI
        run: python -m pip install -v --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ unopy

      - name: Diagnose unopy import (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # 1. Is the module findable at all?
          python -c "import importlib.util; spec = importlib.util.find_spec('unopy'); print('SPEC:', spec)"

          # 2. Where did pip install it?
          python -m pip show unopy

          # 3. What files are in the package?
          python -c "
          import importlib.util, os
          spec = importlib.util.find_spec('unopy')
          if spec:
              d = os.path.dirname(spec.origin)
              for f in os.listdir(d):
                  print(f)
          else:
              print('unopy not found by importlib')
          "

          # 4. What does the actual import error say in full?
          python -c "
          import traceback
          try:
              import unopy
          except Exception as e:
              traceback.print_exc()
          "

          # 5. What is on sys.path?
          python -c "import sys; [print(p) for p in sys.path]"

      - name: Run example
        working-directory: ${{github.workspace}}/interfaces/Python/example
        run: python example_hs015.py
