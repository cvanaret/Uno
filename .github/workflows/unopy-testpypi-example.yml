name: TestPyPI's unopy on Python example

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'
      - '*.yml'
      - '*.yaml'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'
      - '*.yml'
      - '*.yaml'
      - 'docs/**'

env:
  BUILD_TYPE: Debug

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Add MSBuild/MSVC to PATH (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Upgrade pip, setuptools, wheel
        run: python -m pip install --upgrade pip setuptools wheel
      
      - name: Install unopy from TestPyPI
        run: python -m pip install -v --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ unopy

      - name: Inspect unopy on disk (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # 1. List everything in site-packages related to unopy
          Get-ChildItem "C:\hostedtoolcache\windows\Python\3.12.10\x64\Lib\site-packages" | Where-Object { $_.Name -like "*unopy*" }

          # 2. List contents of the unopy folder/egg-info if it exists
          $dir = "C:\hostedtoolcache\windows\Python\3.12.10\x64\Lib\site-packages\unopy"
          if (Test-Path $dir) {
              Get-ChildItem $dir -Recurse
          } else {
              Write-Host "No unopy directory found!"
          }

          # 3. Check the .dist-info RECORD to see what files were supposed to be installed
          $record = "C:\hostedtoolcache\windows\Python\3.12.10\x64\Lib\site-packages\unopy-0.2.5.dist-info\RECORD"
          if (Test-Path $record) {
              Get-Content $record
          } else {
              Write-Host "No RECORD file found!"
          }

      - name: Run example
        working-directory: ${{github.workspace}}/interfaces/Python/example
        run: python example_hs015.py
