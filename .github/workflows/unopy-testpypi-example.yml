name: TestPyPI's unopy on Python example

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'
      - '*.yml'
      - '*.yaml'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'
      - '*.yml'
      - '*.yaml'
      - 'docs/**'

env:
  BUILD_TYPE: Debug

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Add MSBuild/MSVC to PATH (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Upgrade pip, setuptools, wheel
        run: python -m pip install --upgrade pip setuptools wheel
      
      - name: Install unopy from TestPyPI
        run: python -m pip install -v --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ unopy

      - name: Diagnose DLL issue (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # 1. What got bundled into the wheel?
          Get-ChildItem "C:\hostedtoolcache\windows\Python\3.12.10\x64\Lib\site-packages\unopy" -Recurse
          Get-ChildItem "C:\hostedtoolcache\windows\Python\3.12.10\x64\Lib\site-packages\unopy.libs" -Recurse

          # 2. What does delvewheel think is still missing?
          pip install delvewheel
          delvewheel show "C:\hostedtoolcache\windows\Python\3.12.10\x64\Lib\site-packages\unopy\unopy.cp312-win_amd64.pyd"

          # 3. Full traceback of the import error
          python -c "
          import traceback
          try:
              import unopy
          except Exception:
              traceback.print_exc()
          "

      - name: Find missing symbol (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        continue-on-error: true
        run: |
          $script = @'
          import pefile, os, sys
    
          libs_dir = 'C:/hostedtoolcache/windows/Python/3.12.10/x64/Lib/site-packages/unopy.libs'
          pyd = 'C:/hostedtoolcache/windows/Python/3.12.10/x64/Lib/site-packages/unopy/unopy.cp312-win_amd64.pyd'
    
          # Verify libs_dir exists and is being added
          print('libs_dir exists:', os.path.isdir(libs_dir))
          print('libs_dir abspath:', os.path.abspath(libs_dir))
          os.add_dll_directory(os.path.abspath(libs_dir))
    
          # Try loading with ctypes for a more specific error
          import ctypes
          try:
            ctypes.CDLL(pyd)
            print('ctypes load succeeded')
          except OSError as e:
            print('ctypes error:', e)
    
          # What does the .pyd import?
          pe = pefile.PE(pyd)
          for entry in pe.DIRECTORY_ENTRY_IMPORT:
            dll_name = entry.dll.decode()
            print('DLL: ' + dll_name)
            for imp in entry.imports:
              name = imp.name.decode() if imp.name else 'ordinal:' + str(imp.ordinal)
              print('  ' + name)
          '@
          $script | Out-File -FilePath diagnose.py -Encoding utf8
          python diagnose.py

      - name: Check GCC versions in DLLs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        continue-on-error: true
        run: |
          $script = @'
          import pefile, os
    
          libs_dir = 'C:/hostedtoolcache/windows/Python/3.12.10/x64/Lib/site-packages/unopy.libs'
          pyd = 'C:/hostedtoolcache/windows/Python/3.12.10/x64/Lib/site-packages/unopy/unopy.cp312-win_amd64.pyd'
    
          def get_comment(path):
            pe = pefile.PE(path)
            for section in pe.sections:
              name = section.Name.rstrip(b'\x00').decode()
              if name == '.comment':
                return section.get_data().rstrip(b'\x00').decode(errors='replace')
            return 'no .comment section'
    
          print('unopy.pyd: ' + get_comment(pyd))
          for dll in sorted(os.listdir(libs_dir)):
              path = os.path.join(libs_dir, dll)
              print(dll + ': ' + get_comment(path))
          '@
          $script | Out-File -FilePath diagnose3.py -Encoding utf8
          python diagnose3.py

      - name: Run example
        working-directory: ${{github.workspace}}/interfaces/Python/example
        run: python example_hs015.py
