name: TestPyPI's unopy on Python example

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'
      - '*.yml'
      - '*.yaml'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'
      - '*.yml'
      - '*.yaml'
      - 'docs/**'

env:
  BUILD_TYPE: Debug

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Add MSBuild/MSVC to PATH (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Upgrade pip, setuptools, wheel
        run: python -m pip install --upgrade pip setuptools wheel
      
      - name: Install unopy from TestPyPI
        run: python -m pip install -v --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ unopy

      - name: Diagnose DLL issue (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # 1. What got bundled into the wheel?
          Get-ChildItem "C:\hostedtoolcache\windows\Python\3.12.10\x64\Lib\site-packages\unopy" -Recurse
          Get-ChildItem "C:\hostedtoolcache\windows\Python\3.12.10\x64\Lib\site-packages\unopy.libs" -Recurse

          # 2. What does delvewheel think is still missing?
          pip install delvewheel
          delvewheel show "C:\hostedtoolcache\windows\Python\3.12.10\x64\Lib\site-packages\unopy\unopy.cp312-win_amd64.pyd"

          # 3. Full traceback of the import error
          python -c "
          import traceback
          try:
              import unopy
          except Exception:
              traceback.print_exc()
          "

      - name: Find missing symbol (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Check which DLLs the .pyd imports and whether they're resolvable
          python -c "
          import os, sys
          os.add_dll_directory(os.path.abspath('C:/hostedtoolcache/windows/Python/3.12.10/x64/Lib/site-packages/unopy.libs'))
          import ctypes
          pyd = 'C:/hostedtoolcache/windows/Python/3.12.10/x64/Lib/site-packages/unopy/unopy.cp312-win_amd64.pyd'
          try:
              ctypes.CDLL(pyd)
          except OSError as e:
              print('ctypes error:', e)
          "
      
          # List all DLLs imported by the .pyd using dumpbin (available with MSVC)
          & 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC\14.43.34808\bin\Hostx64\x64\dumpbin.exe' /dependents 'C:\hostedtoolcache\windows\Python\3.12.10\x64\Lib\site-packages\unopy\unopy.cp312-win_amd64.pyd'

      - name: Run example
        working-directory: ${{github.workspace}}/interfaces/Python/example
        run: python example_hs015.py
