name: Buildatforms)

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:

        # ---------- LINUX ----------
        - os: ubuntu-latest
          toolchain: gcc
          build_type: Debug
          shell: bash

        - os: ubuntu-24.04-arm
          toolchain: gcc
          build_type: Debug
          shell: bash

        # ---------- MACOS ----------
        - os: macos-latest
          toolchain: gcc
          build_type: Debug
          shell: bash

        - os: macos-15-intel
          toolchain: gcc
          build_type: Debug
          shell: bash

        # ---------- WINDOWS MINGW ----------
        - os: windows-latest
          toolchain: mingw
          build_type: Debug
          shell: msys2 {0}

        # -------- Windows MSVC --------
        - os: windows-latest
          toolchain: msvc
          build_type: Debug
          shell: cmd
          library: static

        - os: windows-latest
          toolchain: msvc
          build_type: Debug
          shell: cmd
          library: shared

    env:
      BUILD_TYPE: ${{ matrix.build_type }}

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
    - uses: actions/checkout@v4

    # =========================================================
    # TOOLCHAIN SETUP
    # =========================================================

    # ----- macOS -----
    - name: Setup Fortran (macOS)
      if: startsWith(matrix.os, 'macos')
      uses: fortran-lang/setup-fortran@main
      with:
        compiler: 'gcc'
        version: '14'

    # ----- MSVC -----
    - name: MSVC environment
      if: matrix.toolchain == 'msvc'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Intel Fortran
      if: matrix.toolchain == 'msvc'
      uses: fortran-lang/setup-fortran@main
      with:
        compiler: intel
        version: '2025.0'

    # ----- MinGW -----
    - name: Setup MSYS2
      if: matrix.toolchain == 'mingw'
      uses: msys2/setup-msys2@v2
      with:
        path-type: inherit
        msystem: MINGW64
        update: true
        install: |
          mingw-w64-x86_64-gcc-fortran
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-make

    # =========================================================
    # DEPENDENCIES
    # =========================================================

    - name: Download dependencies
      run: bash dependencies/scripts/download_dependencies.sh

    # =========================================================
    # MSVC: BUILD BLAS/LAPACK
    # =========================================================

    - name: Build LAPACK (MSVC)
      if: matrix.toolchain == 'msvc'
      shell: cmd
      run: |
        git clone https://github.com/Reference-LAPACK/lapack.git
        cd lapack
        mkdir build
        cd build
        cmake -G "NMake Makefiles" .. ^
          -DCBLAS=ON ^
          -DLAPACKE=OFF ^
          -DCMAKE_INSTALL_PREFIX=${{github.workspace}}\dependencies ^
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} ^
          -DCMAKE_C_COMPILER=cl ^
          -DCMAKE_CXX_COMPILER=cl ^
          -DCMAKE_Fortran_COMPILER=ifx ^
          -DBUILD_SHARED_LIBS=OFF ^
          -DTEST_FORTRAN_COMPILER=OFF
        nmake
        nmake install

    # =========================================================
    # CONFIGURE
    # =========================================================

    - name: Configure
      if: runner.os != 'Windows'
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
          -DMUMPS_INCLUDE_DIR=${{github.workspace}}/dependencies/include \
          -DMETIS_INCLUDE_DIR=${{github.workspace}}/dependencies/include \
          -DBQPD=${{github.workspace}}/dependencies/lib/libbqpd.a \
          -DMETIS_LIBRARY=${{github.workspace}}/dependencies/lib/libmetis.a \
          -DMUMPS_LIBRARY=${{github.workspace}}/dependencies/lib/libdmumps.a \
          -DMUMPS_COMMON_LIBRARY=${{github.workspace}}/dependencies/lib/libmumps_common.a \
          -DMUMPS_PORD_LIBRARY=${{github.workspace}}/dependencies/lib/libpord.a \
          -DMUMPS_MPISEQ_LIBRARY=${{github.workspace}}/dependencies/lib/libmpiseq.a \
          -DBLAS_LIBRARIES="${{github.workspace}}/dependencies/lib/libblas.a;${{github.workspace}}/dependencies/lib/libcblas.a" \
          -DLAPACK_LIBRARIES=${{github.workspace}}/dependencies/lib/liblapack.a \
          -DHIGHS=${{github.workspace}}/dependencies/lib/libhighs.a

    # ----- MinGW -----
    - name: Configure (MinGW)
      if: matrix.toolchain == 'mingw'
      shell: cmd
      run: |
        cmake -G "MinGW Makefiles" ^
          -B build ^
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} ^
          -DMUMPS_INCLUDE_DIR=${{github.workspace}}\dependencies\include ^
          -DMETIS_INCLUDE_DIR=${{github.workspace}}\dependencies\include ^
          -DBQPD=${{github.workspace}}\dependencies\lib\libbqpd.a ^
          -DMETIS_LIBRARY=${{github.workspace}}\dependencies\lib\libmetis.a ^
          -DMUMPS_LIBRARY=${{github.workspace}}\dependencies\lib\libdmumps.a ^
          -DMUMPS_COMMON_LIBRARY=${{github.workspace}}\dependencies\lib\libmumps_common.a ^
          -DMUMPS_PORD_LIBRARY=${{github.workspace}}\dependencies\lib\libpord.a ^
          -DMUMPS_MPISEQ_LIBRARY=${{github.workspace}}\dependencies\lib\libmpiseq.a ^
          -DBLAS_LIBRARIES="${{github.workspace}}\dependencies\lib\libblas.a;${{github.workspace}}\dependencies\lib\libcblas.a" ^
          -DLAPACK_LIBRARIES=${{github.workspace}}\dependencies\lib\liblapack.a ^
          -DHIGHS=${{github.workspace}}\dependencies\lib\libhighs.a .

    # ----- MSVC -----
    - name: Configure (MSVC static)
      if: matrix.toolchain == 'msvc' && matrix.library == 'static'
      shell: cmd
      run: |
        cmake -G "NMake Makefiles" ^
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} ^
          -DCMAKE_C_COMPILER=cl ^
          -DCMAKE_CXX_COMPILER=cl ^
          -DCMAKE_Fortran_COMPILER=ifx ^
          -DMUMPS_INCLUDE_DIR=${{github.workspace}}\dependencies\include ^
          -DMETIS_INCLUDE_DIR=${{github.workspace}}\dependencies\include ^
          -DBQPD=${{github.workspace}}\dependencies\lib\libbqpd.a ^
          -DMETIS_LIBRARY=${{github.workspace}}\dependencies\lib\libmetis.a ^
          -DMUMPS_LIBRARY=${{github.workspace}}\dependencies\lib\libdmumps.a ^
          -DMUMPS_COMMON_LIBRARY=${{github.workspace}}\dependencies\lib\libmumps_common.a ^
          -DMUMPS_PORD_LIBRARY=${{github.workspace}}\dependencies\lib\libpord.a ^
          -DMUMPS_MPISEQ_LIBRARY=${{github.workspace}}\dependencies\lib\libmpiseq.a ^
          -DBLAS_LIBRARIES="${{github.workspace}}\dependencies\lib\libblas.lib;${{github.workspace}}\dependencies\lib\libcblas.lib" ^
          -DLAPACK_LIBRARIES=${{github.workspace}}\dependencies\lib\liblapack.lib ^
          -DBUILD_STATIC_LIBS=ON ^
          -DBUILD_SHARED_LIBS=OFF .

    - name: Configure (MSVC shared)
      if: matrix.toolchain == 'msvc' && matrix.library == 'shared'
      shell: cmd
      run: |
        cmake -G "NMake Makefiles" ^
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} ^
          -DCMAKE_C_COMPILER=cl ^
          -DCMAKE_CXX_COMPILER=cl ^
          -DCMAKE_Fortran_COMPILER=ifx ^
          -DBLAS_LIBRARIES="${{github.workspace}}\dependencies\lib\libblas.lib;${{github.workspace}}\dependencies\lib\libcblas.lib" ^
          -DLAPACK_LIBRARIES=${{github.workspace}}\dependencies\lib\liblapack.lib ^
          -DBUILD_STATIC_LIBS=OFF ^
          -DBUILD_SHARED_LIBS=ON .

    # =========================================================
    # BUILD
    # =========================================================

    - name: Build
      run: cmake --build build --config ${{env.BUILD_TYPE}} -j4
