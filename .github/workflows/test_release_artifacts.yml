name: Test release artifacts

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'
      - '*.yml'
      - '*.yaml'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '*.cff'
      - '*.yml'
      - '*.yaml'
      - 'docs/**'

env:
  BUILD_TYPE: Release

jobs:
  test-precompiled:
    name: ${{ matrix.os }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            artifact-os: linux-gnu
            artifact-ext: tar.gz
            dep-extension: so
            libuno-extension: so

          - os: ubuntu-22.04-arm
            arch: aarch64
            artifact-os: linux-gnu
            artifact-ext: tar.gz
            dep-extension: so
            libuno-extension: so

          - os: macos-latest
            arch: aarch64
            artifact-os: apple-darwin
            artifact-ext: tar.gz
            dep-extension: dylib
            libuno-extension: dylib

          - os: macos-15-intel
            arch: x86_64
            artifact-os: apple-darwin
            artifact-ext: tar.gz
            dep-extension: dylib
            libuno-extension: dylib

          - os: windows-latest
            arch: x86_64
            artifact-os: w64-mingw32
            artifact-ext: zip
            dep-extension: dll
            libuno-extension: dll.a

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find out latest Uno release tag
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh release view --repo cvanaret/Uno --json tagName -q .tagName)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          # Strip leading 'v' to get a bare version string, e.g. "1.2.3"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download precompiled artifact
        id: download
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          ARCHIVE="Uno_binaries.${TAG}.${{ matrix.arch }}-${{ matrix.artifact-os }}-cxx11.${{ matrix.artifact-ext }}"
          echo "Downloading ${ARCHIVE} ..."
          gh release download "${TAG}" \
            --repo cvanaret/Uno \
            --pattern "${ARCHIVE}" \
            --dir "${{ runner.temp }}"
          echo "artifact=${{ runner.temp }}/${ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "UNO_DIR=${{ runner.temp }}/Uno" >> "$GITHUB_ENV"

      - name: Extract artifact (tar.gz)
        if: matrix.artifact-ext == 'tar.gz'
        shell: bash
        run: |
          mkdir -p "${{ env.UNO_DIR }}"
          tar -xzf "${{ steps.download.outputs.artifact }}" -C "${{ env.UNO_DIR }}"

      - name: Extract artifact (zip)
        if: matrix.artifact-ext == 'zip'
        shell: pwsh
        run: |
          Expand-Archive -Path "${{ steps.download.outputs.artifact }}" -DestinationPath "${{ env.UNO_DIR }}"

      - name: Set LD_LIBRARY_PATH (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "LD_LIBRARY_PATH=${{ env.UNO_DIR }}/lib:${{ env.UNO_DIR }}/deps${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" \
            >> "$GITHUB_ENV"
          echo "${{ env.UNO_DIR }}/bin" >> "$GITHUB_PATH"

      - name: Set DYLD_LIBRARY_PATH (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "DYLD_LIBRARY_PATH=${{ env.UNO_DIR }}/lib:${{ env.UNO_DIR }}/deps${DYLD_LIBRARY_PATH:+:$DYLD_LIBRARY_PATH}" \
            >> "$GITHUB_ENV"
          echo "DYLD_FALLBACK_LIBRARY_PATH=${{ env.UNO_DIR }}/lib:${{ env.UNO_DIR }}/deps" \
            >> "$GITHUB_ENV"
          echo "${{ env.UNO_DIR }}/bin" >> "$GITHUB_PATH"

      - name: Set PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # On Windows all three directories need to be on PATH so that the
          # dynamic linker can find the DLLs at runtime.
          "${{ env.UNO_DIR }}\bin"  | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "${{ env.UNO_DIR }}\lib"  | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "${{ env.UNO_DIR }}\deps" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure example CMake (Linux and macOS)
        if: runner.os != 'Windows'
        working-directory: ${{github.workspace}}/interfaces/C/example
        shell: bash
        run: |
          cmake -B "${{github.workspace}}/interfaces/C/example/build" \
                -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
                -DUNO="${{ env.UNO_DIR }}/lib/libuno.${{matrix.libuno-extension}}" \
                -DLAPACK_LIBRARIES="${{ env.UNO_DIR }}/deps/libopenblas.${{matrix.dep-extension}}" \
                -DBLAS_LIBRARIES="${{ env.UNO_DIR }}/deps/libopenblas.${{matrix.dep-extension}}" \
                .
          
      - name: Configure example CMake (Windows)
        if: runner.os == 'Windows'
        working-directory: ${{github.workspace}}/interfaces/C/example
        shell: bash
        run: |
          cmake -G "MinGW Makefiles"
                -B "${{github.workspace}}/interfaces/C/example/build" \
                -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
                -DUNO:FILEPATH="${{ env.UNO_DIR }}/lib/libuno.${{matrix.libuno-extension}}" \
                -DLAPACK_LIBRARIES="${{ env.UNO_DIR }}/deps/libopenblas.${{matrix.dep-extension}}" \
                -DBLAS_LIBRARIES="${{ env.UNO_DIR }}/deps/libopenblas.${{matrix.dep-extension}}" \
                -DCMAKE_MAKE_PROGRAM=C:/mingw64/bin/mingw32-make.exe \
                -DCMAKE_C_COMPILER=C:/mingw64/bin/gcc.exe \
                -DCMAKE_CXX_COMPILER=C:/mingw64/bin/g++.exe \
                -DCMAKE_Fortran_COMPILER=C:/mingw64/bin/gfortran.exe \
                .

      - name: Build example
        working-directory: ${{github.workspace}}/interfaces/C/example
        shell: bash
        run: cmake --build "${{github.workspace}}/interfaces/C/example/build" --config ${{env.BUILD_TYPE}}

      - name: Run example
        working-directory: ${{github.workspace}}/interfaces/C/example/build
        shell: bash
        run: ./example_hs015
